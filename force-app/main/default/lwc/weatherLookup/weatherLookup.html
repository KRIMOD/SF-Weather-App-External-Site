<template>
    <lightning-card title="Weather Lookup" icon-name="utility:world">
        <div class="slds-var-p-around_medium">
            <div class="slds-grid slds-wrap slds-gutters_small">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-input
                        label="City"
                        name="inputCity"
                        type="text"
                        value={inputCity}
                        onchange={handleInputChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                    <lightning-input
                        label="State / Region"
                        name="inputState"
                        type="text"
                        value={inputState}
                        onchange={handleInputChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                    <lightning-input
                        label="Country"
                        name="inputCountry"
                        type="text"
                        value={inputCountry}
                        onchange={handleInputChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-input
                        label="Latitude"
                        name="inputLatitude"
                        type="number"
                        step="0.000001"
                        value={inputLatitude}
                        onchange={handleInputChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-input
                        label="Longitude"
                        name="inputLongitude"
                        type="number"
                        step="0.000001"
                        value={inputLongitude}
                        onchange={handleInputChange}
                    ></lightning-input>
                </div>
            </div>

            <div class="slds-m-top_medium actions">
                <lightning-button
                    label="Get Weather"
                    variant="brand"
                    onclick={handleGetWeather}
                    disabled={disableFetchButton}
                ></lightning-button>
                <template if:true={showLocationButton}>
                    <lightning-button
                        class="slds-m-left_small"
                        label="Use My Location"
                        onclick={handleUseMyLocation}
                        disabled={isLoading}
                    ></lightning-button>
                </template>
            </div>

            <template if:true={isLoading}>
                <div class="spinner-shell slds-m-top_medium">
                    <lightning-spinner alternative-text="Loading weather"></lightning-spinner>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-m-top_medium slds-text-color_error">{errorMessage}</div>
            </template>

            <template if:true={sendResultMessage}>
                <div class="slds-m-top_medium success-message">{sendResultMessage}</div>
            </template>

            <template if:true={showWeatherSummary}>
                <section class="weather-summary slds-m-top_medium">
                    <div class="summary-header">
                        <div class="weather-glyph" title={conditionDisplay}>{displayIconGlyph}</div>
                        <div class="slds-m-left_small">
                            <div class="location-name">{resolvedLocation}</div>
                            <div class="condition-text">{conditionDisplay}</div>
                            <template if:true={weatherSource}>
                                <div class="meta-text">Source: {weatherSource}</div>
                            </template>
                        </div>
                    </div>
                    <div class="metrics slds-grid slds-wrap slds-gutters_small slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="metric-card">
                                <div class="metric-label">Temperature</div>
                                <div class="metric-value">{temperatureDisplay}</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="metric-card">
                                <div class="metric-label">Humidity</div>
                                <div class="metric-value">{humidityDisplay}</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="metric-card">
                                <div class="metric-label">Wind Speed</div>
                                <div class="metric-value">{windSpeedDisplay}</div>
                            </div>
                        </div>
                    </div>
                    <template if:true={showRecipientSelector}>
                        <div class="slds-m-top_medium recipient-selector">
                            <lightning-input
                                label={recipientSearchLabel}
                                type="search"
                                value={recipientSearchTerm}
                                onchange={handleRecipientSearchChange}
                                placeholder={recipientSearchPlaceholder}
                            ></lightning-input>
                            <div class="selector-help slds-m-top_x-small">{recipientSelectorHelpText}</div>
                            <template if:true={hasSelectedRecipients}>
                                <div class="pill-row slds-m-top_small">
                                    <template for:each={selectedRecipientPills} for:item="recipient">
                                        <lightning-pill
                                            key={recipient.value}
                                            label={recipient.label}
                                            name={recipient.value}
                                            onremove={handleRecipientRemove}
                                        ></lightning-pill>
                                    </template>
                                </div>
                            </template>
                            <template if:true={hasFilteredRecipientOptions}>
                                <div class="lookup-results slds-m-top_small">
                                    <template for:each={filteredRecipientOptions} for:item="recipient">
                                        <button
                                            key={recipient.value}
                                            class="lookup-option"
                                            data-recipient-id={recipient.value}
                                            onclick={handleRecipientSelect}
                                            type="button"
                                        >
                                            {recipient.label}
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                    <div class="slds-m-top_medium actions">
                        <lightning-button
                            label={sendButtonLabel}
                            onclick={handleSendWeatherReport}
                            disabled={disableSendButton}
                        ></lightning-button>
                    </div>
                </section>
            </template>
        </div>
    </lightning-card>
</template>
